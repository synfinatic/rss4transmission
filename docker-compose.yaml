# example, edit to taste
version: "3"

services:
  rss4transmission:
    container_name: rss4transmission
    restart: unless-stopped
    image: synfinatic/rss4transmission:latest
    network_mode: host
    user: 1026:100
    environment:
      - POLL_SECONDS=120
      - LOG_LEVEL=info
      - HISTORY_PORT=0  # set to a port number to enable the history web UI
    volumes:
      - /volume1/docker/transmission/rss4transmission:/config
    # Uncomment and set to match HISTORY_PORT when history web UI is enabled.
    # network_mode: host already exposes all ports, so no explicit mapping is needed.

  transmission:
    container_name: transmission
    restart: unless-stopped
    image: lscr.io/linuxserver/transmission:latest
    network_mode: host
    environment:
      - PUID=1026
      - GUID=100
      - TZ=US/Pacific
      - USER=admin
      - PASS=admin
    volumes:
      - /volume1/docker/transmission/data:/config
      - /volume1/video/torrents:/torrents
