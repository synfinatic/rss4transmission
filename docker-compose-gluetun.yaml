# example for using with Gluetun, edit to taste
version: "3"

services:
  rss4transmission:
    image: synfinatic/rss4transmission:latest
    container_name: rss4transmission
    restart: unless-stopped
    # rss4transmission is intentionally NOT on the gluetun network so that RSS
    # feed fetching does not go through the VPN. Because of this, its ports are
    # published directly from this container — not via the gluetun service.
    # If you want the cancel endpoint on the same host IP as gluetun, use
    # network_mode: "service:gluetun" here and move the port below to gluetun's
    # ports section (note: this will also route RSS fetching over the VPN).
    depends_on:
      - gluetun
      - transmission
    user: 1026:100
    environment:
      - POLL_SECONDS=120
      - LOG_LEVEL=info
      - HISTORY_FILE=       # path to history JSON file (e.g. /config/history.json)
      - PRIVATE_LISTEN=     # set to host:port or bare port to enable the history web UI (private)
      - PUBLIC_LISTEN=      # public-facing /cancel, /notify-complete, and /healthz only (e.g. 0.0.0.0:8080)
                            # port-forward from your firewall/NAS to this port
      - TORRENT_CACHE_DIR=  # directory to cache fetched .torrent files (e.g. /config/torrent-cache)
    # Uncomment and set the port to match PUBLIC_LISTEN (and/or PRIVATE_LISTEN).
    # ports:
    #   - "8080:8080"  # PUBLIC_LISTEN port — forward this from your firewall/NAS
    volumes:
      - /volume1/docker/transmission/rss4transmission:/config

  transmission:
    image: lscr.io/linuxserver/transmission:latest
    container_name: transmission
    restart: unless-stopped
    network_mode: "service:gluetun"  # forces traffic over gluetun
    depends_on:
      - gluetun
    environment:
      - PUID=1026
      - GUID=100
      - TZ=US/Pacific
      - USER=XXXX
      - PASS=XXXX
    volumes:
      - /volume1/docker/transmission/data:/config
      - /volume1/video/torrents:/torrents

  gluetun:
    image: qmcgaw/gluetun:latest
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - /volume1/docker/transmission/gluetun:/gluetun
    environment:
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=openvpn
      - OPENVPN_USER=XXXXX
      - OPENVPN_PASSWORD=XXXX
      - OPENVPN_VERSION=2.6
      - VPN_PORT_FORWARDING=on
      - SERVER_HOSTNAMES=XXXXX,YYYYYY,ZZZZZ
      - HTTP_CONTROL_SERVER_LOG=off
    ports:
      - "0.0.0.0:9091:9091/tcp"  # expose Transmission RPC/Webui to local network
      - 51413:51413/tcp
      - 51413:51413/udp
      - 9092:8000/tcp   # move the Control Server to 9092 on local network
